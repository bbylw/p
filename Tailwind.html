(function(){
  var nav = document.getElementById("nav-list");
  var main = document.getElementById("content");

  DATA.forEach(function(cat){
    nav.innerHTML += '<li><a href="#'+cat.id+'" class="text-white no-underline text-sm font-semibold font-display px-4 py-2 rounded-full hover:bg-primary hover:text-black inline-block">'+cat.title+'</a></li>';

    var h = '<h2 class="font-display text-xl sm:text-2xl font-bold mt-8 mb-4 text-primary border-l-4 border-primary pl-3 uppercase tracking-tight" id="'+cat.id+'">'+cat.title+'</h2>';
    h += '<section class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-7 xl:grid-cols-8 gap-2.5 sm:gap-3 mb-8">';
    cat.items.forEach(function(d){
      h += '<div class="link-card bg-card rounded-xl p-2 sm:p-3 text-center flex flex-col items-center justify-center h-[96px] sm:h-[108px] relative overflow-hidden cursor-pointer hover:bg-card-hover">'
        + '<a href="'+d[0]+'" target="_blank" class="absolute inset-0 z-20"></a>'
        + '<i class="'+d[1]+' text-xl sm:text-2xl mb-1 text-primary relative z-10 shrink-0"></i>'
        + '<h3 class="text-[11px] sm:text-xs font-medium text-white m-0 leading-[1.35] line-clamp-2 relative z-10 break-all">'+d[2]+'</h3></div>';
    });
    h += '</section>';
    main.innerHTML += h;
  });

  var navLinks = nav.querySelectorAll("a");
  navLinks.forEach(function(link){
    link.addEventListener("click",function(e){
      e.preventDefault();
      navLinks.forEach(function(l){l.classList.remove("active","bg-primary","!text-black")});
      this.classList.add("active","bg-primary","!text-black");
      var el = document.getElementById(this.getAttribute("href").split("#")[1]);
      if(el){el.scrollIntoView({behavior:"smooth"});history.pushState(null,"",location.pathname+"#"+this.getAttribute("href").split("#")[1])}
    });
  });

  function handleHash(){
    var h = location.hash;
    if(h){
      var el = document.getElementById(h.substring(1));
      if(el){
        el.scrollIntoView({behavior:"smooth"});
        var a = nav.querySelector("a[href='"+h+"']");
        if(a){navLinks.forEach(function(l){l.classList.remove("active","bg-primary","!text-black")});a.classList.add("active","bg-primary","!text-black")}
      }
    }
  }
  window.addEventListener("hashchange",handleHash);
  handleHash();
})();
