<html lang="zh-CN">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css" />
  <style>
    :root {
      --bg: #08080a;
      --surface: rgba(255, 255, 255, 0.03);
      --surface-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 140, 56, 0.35);
      --accent: #ff8c38;
      --accent-dim: rgba(255, 140, 56, 0.12);
      --text: #edeae4;
      --text-muted: #7a756e;
      --text-dim: #3d3a36;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Mono', 'Menlo', monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 900px 700px at 15% 5%, rgba(255, 140, 56, 0.04), transparent 60%),
        radial-gradient(ellipse 700px 900px at 85% 50%, rgba(56, 120, 255, 0.025), transparent 55%),
        radial-gradient(ellipse 600px 600px at 50% 95%, rgba(140, 56, 255, 0.02), transparent 50%),
        var(--bg);
    }

    header {
      position: relative;
      text-align: center;
      padding: 5rem 1rem 2.5rem;
    }

    header::before {
      content: '';
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255, 140, 56, 0.06), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: headerPulse 6s ease-in-out infinite;
    }

    @keyframes headerPulse {

      0%,
      100% {
        opacity: 0.4;
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.15);
      }
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 3.2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      text-shadow: 0 0 80px rgba(255, 140, 56, 0.12);
      position: relative;
      z-index: 1;
    }

    header .subtitle {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.6rem;
      position: relative;
      z-index: 1;
    }

    .search-wrap {
      max-width: 460px;
      margin: 0 auto;
      padding: 0 1.5rem;
      position: relative;
    }

    .search-wrap .search-icon {
      position: absolute;
      left: 2.2rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 0.85rem;
      transition: color 0.3s;
      pointer-events: none;
    }

    #search-input {
      width: 100%;
      padding: 0.7rem 1.2rem 0.7rem 2.8rem;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: var(--surface);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      outline: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #search-input:focus {
      border-color: rgba(255, 140, 56, 0.4);
      box-shadow: 0 0 0 3px var(--accent-dim), 0 4px 24px rgba(0, 0, 0, 0.2);
    }

    #search-input::placeholder {
      color: var(--text-dim);
    }

    .search-wrap:focus-within .search-icon {
      color: var(--accent);
    }

    nav#top-nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(8, 8, 10, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      padding: 0.6rem 1rem;
      margin-top: 1.5rem;
    }

    nav#top-nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    nav#top-nav a {
      display: block;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.4rem 1rem;
      border-radius: 100px;
      transition: all 0.25s ease;
      letter-spacing: 0.02em;
    }

    nav#top-nav a:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
    }

    nav#top-nav a.active {
      background: var(--accent);
      color: #08080a;
      font-weight: 500;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 1.5rem 4rem;
    }

    .category-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      margin: 3rem 0 1.2rem;
      padding-left: 1rem;
      border-left: 3px solid var(--accent);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .category-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-dim);
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }

    .link-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(8.5rem, 1fr));
      gap: 0.75rem;
    }

    .link-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.3rem 0.6rem 1rem;
      text-align: center;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 95px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      transform: translateY(12px);
    }

    .link-card.revealed {
      animation: cardReveal 0.45s ease forwards;
    }

    @keyframes cardReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .link-card a {
      position: absolute;
      inset: 0;
      text-decoration: none;
      z-index: 12;
      color: transparent;
    }

    .link-card:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
      transform: translateY(-3px);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.25),
        0 0 0 1px rgba(255, 140, 56, 0.08);
    }

    .link-card i {
      font-size: 1.6rem;
      margin-bottom: 0.65rem;
      color: var(--accent);
      transition: all 0.25s ease;
      position: relative;
      z-index: 11;
    }

    .link-card:hover i {
      transform: scale(1.12);
      filter: drop-shadow(0 0 8px rgba(255, 140, 56, 0.4));
    }

    .link-card h3 {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 400;
      margin: 0;
      color: var(--text-muted);
      line-height: 1.35;
      max-width: 100%;
      height: 2.7em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      text-overflow: ellipsis;
      padding: 0 0.2rem;
      position: relative;
      z-index: 11;
      transition: color 0.25s ease;
    }

    .link-card:hover h3 {
      color: var(--text);
    }

    .no-results {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-dim);
      font-size: 0.85rem;
      display: none;
    }

    .no-results.visible {
      display: block;
    }

    .no-results i {
      font-size: 2rem;
      margin-bottom: 1rem;
      display: block;
    }

    .back-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(8, 8, 10, 0.8);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
      z-index: 999;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .back-top.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .back-top:hover {
      background: var(--accent);
      color: #08080a;
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    footer {
      text-align: center;
      padding: 3rem 1rem 2rem;
      color: var(--text-dim);
      font-size: 0.72rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }

    footer .footer-links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.8rem;
    }

    footer .footer-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.72rem;
      padding: 0.3rem 0.6rem;
      border-radius: 100px;
      transition: color 0.25s ease;
    }

    footer .footer-links a:hover {
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      header {
        padding: 3.5rem 1rem 2rem;
      }

      header h1 {
        font-size: 2.4rem;
      }

      main {
        padding: 0.8rem 1rem 3rem;
      }

      .link-grid {
        grid-template-columns: repeat(auto-fill, minmax(7.5rem, 1fr));
        gap: 0.65rem;
      }

      .category-title {
        font-size: 1.05rem;
        margin: 2.5rem 0 1rem;
      }

      .link-card {
        min-height: 85px;
        padding: 1.1rem 0.5rem 0.8rem;
      }

      .link-card i {
        font-size: 1.4rem;
      }

      .link-card h3 {
        font-size: 0.68rem;
      }
    }

    @media (max-width: 480px) {
      html {
        font-size: 15px;
      }

      header {
        padding: 2.5rem 1rem 1.5rem;
      }

      header h1 {
        font-size: 2rem;
      }

      header .subtitle {
        font-size: 0.7rem;
      }

      .link-grid {
        grid-template-columns: repeat(auto-fill, minmax(6rem, 1fr));
        gap: 0.55rem;
      }

      nav#top-nav a {
        padding: 0.35rem 0.75rem;
        font-size: 0.72rem;
      }

      .link-card {
        min-height: 75px;
        padding: 0.9rem 0.4rem 0.7rem;
      }

      .link-card i {
        font-size: 1.25rem;
        margin-bottom: 0.45rem;
      }

      .link-card h3 {
        font-size: 0.64rem;
        height: 2.5em;
      }

      .back-top {
        bottom: 1.2rem;
        right: 1.2rem;
        width: 36px;
        height: 36px;
      }
    }

    @media (max-width: 360px) {
      html {
        font-size: 14px;
      }

      .link-grid {
        grid-template-columns: repeat(auto-fill, minmax(5.2rem, 1fr));
      }

      header h1 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>

    function renderNavCards() {
      var mainContainer = document.getElementById('main-content');
      if (!mainContainer) return;
      mainContainer.innerHTML = '';

      navData.forEach(function (category) {
        var section = document.createElement('section');
        section.id = category.id;

        var title = document.createElement('h2');
        title.className = 'category-title';
        title.innerHTML = category.title + ' <span class="category-count">' + category.links.length + '</span>';
        section.appendChild(title);

        var grid = document.createElement('div');
        grid.className = 'link-grid';

        category.links.forEach(function (link, idx) {
          var card = document.createElement('div');
          card.className = 'link-card';
          card.style.animationDelay = (idx % 12) * 0.04 + 's';
          card.innerHTML =
            '<a href="' + link.url + '" target="_blank" rel="noopener noreferrer" aria-label="' + link.name + '"></a>' +
            '<i class="' + link.icon + '"></i>' +
            '<h3>' + link.name + '</h3>';
          grid.appendChild(card);
        });

        section.appendChild(grid);
        mainContainer.appendChild(section);
      });
    }

    function initReveal() {
      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.05, rootMargin: '0px 0px 60px 0px' });

      document.querySelectorAll('.link-card').forEach(function (card) {
        observer.observe(card);
      });
    }

    function initSearch() {
      var input = document.getElementById('search-input');
      var noResults = document.getElementById('no-results');

      input.addEventListener('input', function () {
        var q = input.value.toLowerCase().trim();
        var totalVisible = 0;

        document.querySelectorAll('section').forEach(function (section) {
          var sectionVisible = 0;
          section.querySelectorAll('.link-card').forEach(function (card) {
            var name = card.querySelector('h3').textContent.toLowerCase();
            var visible = !q || name.indexOf(q) !== -1;
            card.style.display = visible ? '' : 'none';
            if (visible) {
              if (!card.classList.contains('revealed')) {
                card.classList.add('revealed');
              }
              sectionVisible++;
              totalVisible++;
            }
          });
          section.style.display = sectionVisible ? '' : 'none';
        });

        if (totalVisible === 0 && q.length > 0) {
          noResults.classList.add('visible');
        } else {
          noResults.classList.remove('visible');
        }
      });
    }

    function initNav() {
      var navLinks = document.querySelectorAll('#top-nav a');

      navLinks.forEach(function (link) {
        link.addEventListener('click', function (e) {
          e.preventDefault();
          navLinks.forEach(function (l) { l.classList.remove('active'); });
          this.classList.add('active');
          var targetId = this.getAttribute('href').split('#')[1];
          var targetElement = document.getElementById(targetId);
          if (targetElement) {
            targetElement.scrollIntoView({ behavior: 'smooth' });
            var newUrl = window.location.protocol + '//' + window.location.host + window.location.pathname + '#' + targetId;
            window.history.pushState({ path: newUrl }, '', newUrl);
          }
        });
      });

      function handleHashChange() {
        var hash = window.location.hash;
        if (hash) {
          var targetElement = document.getElementById(hash.substring(1));
          if (targetElement) {
            targetElement.scrollIntoView({ behavior: 'smooth' });
            var activeLink = document.querySelector('#top-nav a[href="' + hash + '"]');
            if (activeLink) {
              navLinks.forEach(function (l) { l.classList.remove('active'); });
              activeLink.classList.add('active');
            }
          }
        }
      }

      window.addEventListener('hashchange', handleHashChange);
      handleHashChange();
    }

    function initBackTop() {
      var btn = document.getElementById('back-top');
      window.addEventListener('scroll', function () {
        if (window.scrollY > 400) {
          btn.classList.add('visible');
        } else {
          btn.classList.remove('visible');
        }
      });
      btn.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      renderNavCards();
      initReveal();
      initSearch();
      initNav();
      initBackTop();
      document.getElementById('year').textContent = new Date().getFullYear();
    });
