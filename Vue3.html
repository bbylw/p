  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            theme: {
              bg: 'var(--theme-bg)',
              header: 'var(--theme-header-bg)',
              card: 'var(--theme-card-bg)',
              hoverCard: 'var(--theme-card-hover-bg)',
              textPrimary: 'var(--theme-text-primary)',
              textSecondary: 'var(--theme-text-secondary)',
              accent: 'var(--theme-accent)',
              accentHover: 'var(--theme-accent-hover)',
              accentLight: 'var(--theme-accent-light)',
              border: 'var(--theme-border)',
            }
          }
        }
      }
    }
  </script>

  <style>
    /* 统一的经典橙黑极客主题 (无多套主题切换) */
    :root {
      --theme-bg: #0d0d0d;
      --theme-header-bg: #000000;
      --theme-card-bg: #1a1a1a;
      --theme-card-hover-bg: #262626;
      --theme-text-primary: #ffffff;
      --theme-text-secondary: #a3a3a3;
      --theme-accent: #ff9000;
      --theme-accent-hover: #e07f00;
      --theme-accent-light: rgba(255, 144, 0, 0.15);
      --theme-border: #262626;
    }

    body {
      transition: background-color 0.3s ease, color 0.3s ease;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* 自定义滚动条样式 */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--theme-bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--theme-border);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--theme-accent);
    }
    
    /* 平滑滚动 */
    html {
      scroll-behavior: smooth;
    }
  </style>
</head>

            W

          <div>

        </div>

            <i class="fa-solid fa-magnifying-glass"></i>
          </span>
          <input 
            ref="searchInput"
            v-model="searchQuery" 
            type="text"

          />
          <button 
            v-if="searchQuery" 
            @click="clearSearch"
            class="absolute inset-y-0 right-0 flex items-center pr-3 text-theme-textSecondary hover:text-theme-accent"
          >
            <i class="fa-solid fa-circle-xmark"></i>
          </button>
          <span v-else class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-[10px] text-theme-textSecondary font-mono hidden sm:inline-block">
            /
          </span>
        </div>

      </div>
    </header>

    <!-- 2. 分类快速跳转 (固定的副导航) -->

            :class="activeCategory === 'all' ? 'bg-theme-accent text-black shadow-md' : 'text-theme-textSecondary hover:text-theme-textPrimary hover:bg-theme-hoverCard'"
          >
            全部显示
          </button>
          
          <button 
            v-for="cat in categories" 
            :key="cat.key"
            @click="switchCategory(cat.key)"
            class="px-4 py-1.5 rounded-full text-xs font-bold transition-all flex items-center gap-1.5"
            :class="activeCategory === cat.key ? 'bg-theme-accent text-black shadow-md' : 'text-theme-textSecondary hover:text-theme-textPrimary hover:bg-theme-hoverCard'"
          >
            <i :class="cat.icon"></i>
            {{ cat.name }}
          </button>
        </div>

        <!-- 视图切换模式 -->
        <div class="flex items-center bg-theme-bg p-1 rounded-lg border border-theme-border text-[10px] shrink-0 font-bold hidden lg:flex">
          <button 
            @click="viewMode = 'scroll'" 
            class="px-2.5 py-1 rounded transition-all"
            :class="viewMode === 'scroll' ? 'bg-theme-accent text-black shadow' : 'text-theme-textSecondary hover:text-theme-textPrimary'"
          >

          </button>
          <button 
            @click="viewMode = 'filter'"

            :class="viewMode === 'filter' ? 'bg-theme-accent text-black shadow' : 'text-theme-textSecondary hover:text-theme-textPrimary'"

          </button>
        </div>

    </nav>

        </section>

            </div>

        </section>
      </div>

        title="返回顶部"

    </div>

    <!-- 6. Vue 高级 Toast 通知组件 -->
    <div class="fixed bottom-6 left-6 z-50 flex flex-col gap-2 max-w-sm w-full pointer-events-none">
      <transition-group name="toast-list">
        <div 
          v-for="toast in toasts" 
          :key="toast.id" 
          class="p-4 rounded-xl shadow-2xl border flex items-center gap-3 pointer-events-auto animate-slideUp text-xs font-bold"
          :class="{
            'bg-zinc-900 border-theme-accent text-theme-textPrimary': toast.type === 'success',
            'bg-zinc-900 border-red-500 text-red-400': toast.type === 'error',
            'bg-zinc-900 border-theme-border text-theme-textSecondary': toast.type === 'info',

          <i v-else-if="toast.type === 'error'" class="fa-solid fa-circle-exclamation text-red-500"></i>
          <i v-else class="fa-solid fa-circle-info text-blue-400"></i>

        };

        // 是否已被收藏
        const isPinned = (linkId) => {
          return pinnedIds.value.includes(linkId);
        };

        // 发送通知
        const triggerToast = (message, type = 'success') => {
          const id = Date.now();
          toasts.value.push({ id, message, type });
          setTimeout(() => {
            toasts.value = toasts.value.filter(t => t.id !== id);
          }, 3500);
        };

        const scrollToTop = () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        return {
          links,
          categories,
          searchQuery,
          activeCategory,
          viewMode,
          showBackToTop,
          pinnedLinks,
          activeCategoriesList,
          filteredLinksMap,
          totalMatchedCount,
          pinnedIds,
          toasts,
          searchInput,

          // 方法
          switchCategory,
          resetFilters,
          clearSearch,
          handleLinkClick,
          togglePin,
          isPinned,
          triggerToast,
          scrollToTop
        };
      }
    }).mount('#app');
  </script>

  <!-- 自定义弹窗过渡动画样式 -->
  <style>
    @keyframes scaleIn {
      from {
        transform: scale(0.95);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
    .animate-scaleIn {
      animation: scaleIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* 吐司动画 */
    .toast-list-enter-active,
    .toast-list-leave-active {
      transition: all 0.3s ease;
    }
    .toast-list-enter-from {
      opacity: 0;
      transform: translateY(20px) scale(0.9);
    }
    .toast-list-leave-to {
      opacity: 0;
      transform: translateY(-20px) scale(0.9);
    }
  </style>
</body>

</html>
